name: Sentinel CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test-and-lint:
    name: Test & Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi uvicorn redis docker PyGithub pydantic-settings python-dotenv groq requests

      - name: Check Python Syntax
        run: |
          python -m py_compile main.py log_monitor.py sentinel/*.py

      - name: Build Docker Sandbox Image Validation
        run: |
          docker build -f docker/Dockerfile.sandbox -t sentinel-sandbox:latest docker/

      - name: Build Sentinel App Image Validation
        run: |
          docker build -f docker/Dockerfile.app -t sentinel-app:latest .

  publish-plugin-image:
    name: Build & Publish Log-Monitor Image to GHCR
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Sentinel Log-Monitor Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ghcr.io/diyen48/sentinel-log-monitor:latest
            ghcr.io/diyen48/sentinel-log-monitor:${{ github.sha }}
