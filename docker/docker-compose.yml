# ── Sentinel Pipeline — Docker Compose ──────────────────────────────
# Orchestrates Redis, the FastAPI ingestion API, and the background worker.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# For local development without Docker for the app itself, just run Redis:
#   docker compose -f docker/docker-compose.yml up redis

services:
  # ── Redis (Message Queue) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Sentinel API (Ingestion Layer) ────────────────────────────────
  sentinel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    command: >
      uvicorn sentinel.api:app
      --host 0.0.0.0
      --port 8000
      --log-level info
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── Sentinel Worker (Consumer) ────────────────────────────────────
  sentinel-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    command: python -m sentinel.run_worker
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Docker socket for sandbox container creation (Docker-in-Docker)
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  redis-data:
