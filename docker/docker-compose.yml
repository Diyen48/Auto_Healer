# ── Sentinel Pipeline — Docker Compose ──────────────────────────────
# Orchestrates Redis, the FastAPI ingestion API, and the background worker.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# For local development without Docker for the app itself, just run Redis:
#   docker compose -f docker/docker-compose.yml up redis

services:
  # ── Redis (Message Queue) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Sentinel API (Ingestion Layer) ────────────────────────────────
  sentinel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    command: >
      uvicorn sentinel.api:app
      --host 0.0.0.0
      --port 8000
      --log-level info
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ../sentinel_private_key.pem:/app/sentinel_private_key.pem:ro
    depends_on:
      redis:
        condition: service_healthy

  # ── Sentinel Worker (Consumer) ────────────────────────────────────
  sentinel-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    command: python -m sentinel.run_worker
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Docker socket for sandbox container creation (Docker-in-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: mount RSA Private Key file for GitHub App Authentication
      - ../sentinel_private_key.pem:/app/sentinel_private_key.pem:ro

  # ── Sentinel Log Monitor (Tails Production Container Logs) ───────
  sentinel-log-monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    command: python log_monitor.py
    env_file:
      - ../.env
    environment:
      - SENTINEL_WEBHOOK=http://sentinel-api:8000/webhook/crash
      - LOG_FILE_PATH=/app/server.log
    depends_on:
      - sentinel-api
    volumes:
      # Read-only mount of production application log file (100% safe log access)
      - ../server.log:/app/server.log:ro
      # Universal Docker socket mount
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  redis-data:
